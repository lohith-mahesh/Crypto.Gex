<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CRYPTO.GEX</title>
    <script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{background:#000;color:#ccc;font-family:'JetBrains Mono',monospace;overflow:hidden;margin:0}
        .grid-layout{display:grid;grid-template-columns:260px 1fr 320px;grid-template-rows:50px 1fr 30px;height:100vh}
        .header,.footer{grid-column:1/-1;background:#080808;display:flex;align-items:center;padding:0 20px}
        .header{border-bottom:1px solid #222;justify-content:space-between} .footer{border-top:1px solid #222;justify-content:flex-end;font-size:10px}
        .panel{background:#0a0a0a;border-color:#222;padding:15px;display:flex;flex-direction:column;gap:15px;overflow:hidden}
        .panel-l{border-right:1px solid #222} .panel-r{border-left:1px solid #222}
        .card{background:#111;border:1px solid #222;padding:15px;border-radius:4px;width:100%;box-sizing:border-box}
        .card-label{font-size:10px;font-weight:bold;color:#666;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:1px;width:fit-content;border-bottom:1px dashed #333;cursor:help}
        .val-large{font-size:26px;font-weight:bold;color:#fff;letter-spacing:-1px;line-height:1}
        .cmd-input,.expiry-select{background:#000;border:1px solid #333;color:#fff;padding:6px 12px;font-weight:bold;border-radius:4px;cursor:pointer;outline:none}
        .cmd-input{width:140px;text-transform:uppercase} .expiry-select{font-family:'JetBrains Mono'}
        .cmd-input:focus,.expiry-select:hover{border-color:#3b82f6}
        .table-container{width:100%;overflow-y:auto;overflow-x:hidden} .fixed-table{table-layout:fixed;width:100%;border-collapse:collapse}
        .truncate-cell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0} 
        [data-tooltip]{position:relative} [data-tooltip]::after{content:attr(data-tooltip);position:absolute;background:#000;color:#eee;border:1px solid #444;padding:6px 10px;font-size:10px;z-index:100;opacity:0;pointer-events:none;transition:opacity .1s;width:max-content;max-width:220px;white-space:normal;visibility:hidden;box-shadow:0 4px 10px rgba(0,0,0,.8)}
        [data-tooltip]:hover::after{opacity:1;visibility:visible}
        .panel-l [data-tooltip]::after,.panel-r [data-tooltip]::after{top:100%;margin-top:5px}
        .panel-l [data-tooltip]::after{left:0} .panel-r [data-tooltip]::after{right:0}
        .header [data-tooltip]::after{top:120%;left:50%;transform:translateX(-50%)}
        .legend-box{display:flex;flex-direction:column;gap:6px;padding:8px;background:#0f0f0f;border:1px solid #222;font-size:10px;border-radius:4px}
        .legend-item{display:flex;align-items:center;gap:8px;color:#888;cursor:help} .legend-dot{width:10px;height:10px;border-radius:2px}
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:#000} ::-webkit-scrollbar-thumb{background:#333}
    </style>
</head>
<body>
<div class="grid-layout">
    <div class="header">
        <div class="flex items-center gap-4">
            <span class="font-bold text-white text-xl tracking-tighter" data-tooltip="Crypto.GEX Terminal">CRYPTO<span class="text-blue-500 text-xs tracking-widest font-mono">.GEX</span></span><div class="h-8 w-px bg-gray-800"></div>
            <select id="ticker-select" class="cmd-input" onchange="updateTicker(this.value)" data-tooltip="Select Asset"><option value="" disabled selected>TICKER</option><option value="BTC">BTC</option><option value="ETH">ETH</option><option value="SOL">SOL</option></select>
            <select id="expiry-dd" class="expiry-select" onchange="render()" data-tooltip="Filter Option Chain by Expiration"><option value="ALL">ALL EXPIRIES</option></select>
        </div><div id="status" class="text-[10px] font-bold text-gray-500" data-tooltip="WebSocket Connection State">IDLE</div>
    </div>

    <div class="panel panel-l">
        <div class="card"><span class="card-label" data-tooltip="Current market price">SPOT PRICE</span><div id="val-spot" class="val-large text-white">---</div></div>
        <div class="card bg-gray-900 border-gray-800"><span class="card-label text-white opacity-60" data-tooltip="Volume Weighted Average Price">VOLUME STRUCTURE</span><div class="flex justify-between text-xs mt-2 border-b border-gray-800 pb-1"><span class="text-gray-500">VWAP</span><span id="val-vwap" class="text-white font-bold">---</span></div><div class="text-[10px] text-gray-500 mt-2">Purple Line on Chart</div></div>
        <div class="card"><span class="card-label" data-tooltip="1-Standard Deviation Move">ORACLE 1σ RANGE</span><div id="val-oracle" class="val-large text-white">---</div></div>
        <div class="card"><span class="card-label" data-tooltip="Strike where option writers lose least money">MAX PAIN</span><div id="val-maxpain" class="val-large text-white">---</div></div>
        <div class="card"><span class="card-label" data-tooltip="Put/Call Ratio. >1 Bearish, <0.7 Bullish">SENTIMENT (PCR)</span><div id="val-pcr" class="val-large text-white">---</div></div>
    </div>

    <div class="bg-black relative flex flex-col justify-center items-center overflow-hidden">
        <div id="chart" class="w-full h-full opacity-30"></div><div id="msg-box" class="absolute bg-gray-900 border border-gray-700 px-6 py-3 text-sm text-white font-bold rounded">SELECT TICKER</div>
    </div>

    <div class="panel panel-r">
        <div class="card p-2"><span class="card-label mb-2" data-tooltip="Chart Legend">LEGEND</span><div class="legend-box">
            <div class="legend-item" data-tooltip="Dealer Long Gamma"><div class="legend-dot bg-green-500"></div><span>Call Gamma</span></div><div class="legend-item" data-tooltip="Dealer Short Gamma"><div class="legend-dot bg-red-500"></div><span>Put Gamma</span></div><div class="legend-item" data-tooltip="1SD Volatility Range"><div class="legend-dot bg-white/20"></div><span>Oracle Cone</span></div>
            <div class="legend-item" data-tooltip="Current Spot Price"><div class="legend-dot bg-blue-500"></div><span>Spot Price</span></div><div class="legend-item" data-tooltip="Chain VWAP"><div class="legend-dot bg-purple-500"></div><span>Chain VWAP</span></div><div class="legend-item" data-tooltip="Max Pain Level"><div class="legend-dot bg-yellow-500"></div><span>Max Pain</span></div>
        </div></div>
        <div class="card flex-1 flex flex-col overflow-hidden p-0"><div class="p-3 border-b border-222 bg-111 flex justify-between items-center"><span class="card-label mb-0" data-tooltip="Net Gamma Exposure per Strike">NET GEX</span><span class="text-[9px] text-gray-500" data-tooltip="Relative Volume Intensity">VOL INTEG.</span></div>
        <div class="flex-1 table-container custom-scroll"><table class="fixed-table text-[10px]"><thead class="text-gray-500 sticky top-0 bg-[#111] font-bold"><tr><th class="text-left py-2 pl-3 w-[35%] truncate-cell">STRIKE</th><th class="text-right py-2 pr-2 w-[45%] truncate-cell">NET</th><th class="w-[20%]"></th></tr></thead><tbody id="ladder"></tbody></table></div></div>
    </div><div class="footer"></div>
</div>

<script>
    const $ = id => document.getElementById(id), RFR = 0.05, pdf = x => Math.exp(-0.5*x*x)/Math.sqrt(2*Math.PI);
    let ws = null, md = null;

    const calcGEX = (S,K,T,iv,r,oi) => T<=0 ? 0 : (pdf((Math.log(S/K)+(r+0.5*iv*iv)*T)/(iv*Math.sqrt(T)))/(S*iv*Math.sqrt(T)))*oi*S*S*0.01;

    const init = () => {
        ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onopen = () => { $('status').innerText = "ONLINE"; $('status').className = "text-[10px] font-bold text-green-500"; };
        ws.onclose = () => { $('status').innerText = "OFFLINE"; $('status').className = "text-[10px] font-bold text-red-500"; };
        ws.onmessage = e => {
            const m = JSON.parse(e.data);
            if(m.type === "data") { md = m.payload; popExp(md.chain); $('msg-box').classList.add('hidden'); $('chart').classList.remove('opacity-30'); render(); }
            else if(m.type === "error") { $('msg-box').innerText = m.msg; $('msg-box').classList.remove('hidden'); }
        };
    };

    const updateTicker = v => {
        if(ws?.readyState === 1) { ws.send(JSON.stringify({action:"sub",ticker:v})); $('msg-box').innerText="CALCULATING..."; $('expiry-dd').innerHTML='<option value="ALL">ALL EXPIRIES</option>'; }
        else { init(); setTimeout(() => updateTicker(v), 500); }
    };

    const popExp = c => {
        const dd = $('expiry-dd'), cur = dd.value, m = {"JAN":1,"FEB":2,"MAR":3,"APR":4,"MAY":5,"JUN":6,"JUL":7,"AUG":8,"SEP":9,"OCT":10,"NOV":11,"DEC":12};
        const p = s => parseInt(s.slice(5))*10000 + m[s.slice(2,5)]*100 + parseInt(s.slice(0,2));
        const u = [...new Set(c.map(o=>o.exp))].sort((a,b)=>p(a)-p(b));
        dd.innerHTML = '<option value="ALL">ALL EXPIRIES</option>'; u.forEach(d=>dd.add(new Option(d,d)));
        if(u.includes(cur)) dd.value = cur;
    };

    const render = () => {
        if(!md?.chain) return;
        const sel = $('expiry-dd').value, S = md.spot, st = {}, c = sel === 'ALL' ? md.chain : md.chain.filter(o=>o.exp===sel);
        
        c.forEach(o => {
            const g = calcGEX(S,o.k,o.t,o.iv,RFR,o.oi), sg = Number.isFinite(g) ? g : 0;
            st[o.k] ??= {c:0,p:0,v:0}; o.ty === 'C' ? st[o.k].c += sg : st[o.k].p -= sg; st[o.k].v += (o.vol||0);
        });

        const ks = Object.keys(st).map(Number).sort((a,b)=>a-b), nts = ks.map(k=>st[k].c+st[k].p);
        if(!ks.length) return;

        const vVol = sel !== 'ALL' ? c.reduce((a,b)=>a+(b.vol||0),0) : 0;
        const aVWAP = vVol > 0 ? c.reduce((a,b)=>a+(b.k*(b.vol||0)),0)/vVol : md.vwap;
        const m1SD = S * md.avg_iv * Math.sqrt(sel==='ALL' ? 7/365 : c[0].t), rMin = S*0.7, rMax = S*1.3;
        
        $('val-spot').innerText = "$"+S.toLocaleString(undefined,{maximumFractionDigits:2}); $('val-maxpain').innerText = "$"+md.max_pain.toLocaleString();
        $('val-vwap').innerText = "$"+aVWAP.toLocaleString(undefined,{maximumFractionDigits:2}); $('val-pcr').innerText = md.pcr; $('val-pcr').className = "val-large text-white";
        $('val-oracle').innerText = "+/- $"+m1SD.toLocaleString(undefined,{maximumFractionDigits:0});

        Plotly.newPlot('chart', [{x:ks,y:nts,type:'bar',marker:{color:nts.map(n=>n>0?'#22c55e':'#ef4444')},hovertemplate:'<b>Strike: $%{x}</b><br>Net GEX: $%{y:.2s}<extra></extra>'}], {
            paper_bgcolor:'#000',plot_bgcolor:'#000',margin:{t:20,l:40,r:20,b:30},showlegend:false,xaxis:{gridcolor:'#222',range:[rMin,rMax],tickfont:{color:'#ccc'}},
            yaxis:{gridcolor:'#222',tickfont:{color:'#ccc'}},shapes:[
                {type:'line',x0:S,x1:S,y0:0,y1:1,xref:'x',yref:'paper',line:{color:'#3b82f6',width:2,dash:'dash'}},{type:'line',x0:md.max_pain,x1:md.max_pain,y0:0,y1:1,xref:'x',yref:'paper',line:{color:'#eab308',width:2,dash:'dot'}},
                {type:'line',x0:aVWAP,x1:aVWAP,y0:0,y1:1,xref:'x',yref:'paper',line:{color:'#a855f7',width:2}},{type:'rect',x0:S-m1SD,x1:S+m1SD,y0:0,y1:1,xref:'x',yref:'paper',fillcolor:'white',opacity:0.05,line:{width:0}}
            ],hoverlabel:{bgcolor:"#000",font:{color:"#fff"},bordercolor:"#555"}
        }, {displayModeBar:false});

        const mV = Math.max(...ks.map(k=>st[k].v))||1;
        $('ladder').innerHTML = ks.map((k,i)=>({k,n:nts[i],v:st[k].v})).filter(r=>r.k>rMin&&r.k<rMax).sort((a,b)=>Math.abs(b.n)-Math.abs(a.n)).slice(0,30).map(r=> 
            `<tr class="border-b border-gray-900 hover:bg-gray-800 transition" data-tooltip="Strike: ${r.k} | Vol: ${r.v}"><td class="text-white py-1 pl-3 font-mono text-xs font-bold truncate-cell">${r.k}</td><td class="text-right py-1 pr-3 font-mono text-xs truncate-cell ${r.n>0?'text-green-500':'text-red-500'}">${r.n>0?'+':''}${(r.n/1e6).toFixed(1)}M</td><td class="pr-2 align-middle text-center"><div class="h-1.5 w-1.5 rounded-full ${r.v/mV>0.5?'bg-white':'bg-gray-800'} inline-block" style="opacity:${Math.max(0.3,r.v/mV)}"></div></td></tr>`
        ).join('');
    };
    init();
</script>
</body>
</html>
